{% extends "base.html" %}
{% block title %}Создание задачи{% endblock %}
{% block content %}
<div class="row">
    <div class="col-lg-9">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h4 mb-3">Создание новой задачи</h1>
                <form method="post" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Тема</label>
                        <input class="form-control" name="theme" maxlength="255" required value="{{ form_data.get('theme', '') }}">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Содержимое</label>
                        <textarea class="form-control" rows="6" name="content" required>{{ form_data.get('content', '') }}</textarea>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Организация</label>
                        <select class="form-select" id="organization_id" name="organization_id" required>
                            <option value="">Выберите организацию</option>
                            {% for organization in organizations %}
                            <option value="{{ organization.id }}" {% if form_data.get('organization_id')|int == organization.id %}selected{% endif %}>{{ organization.name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Сотрудник (опционально)</label>
                        <select class="form-select" id="employee_id" name="employee_id" data-selected="{{ form_data.get('employee_id', '') }}">
                            <option value="">Общая задача организации</option>
                            {% for employee in employees %}
                            <option value="{{ employee.id }}" {% if form_data.get('employee_id')|int == employee.id %}selected{% endif %}>{{ employee.full_name }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Срок выполнения</label>
                        <input class="form-control" type="date" name="due_date" required value="{{ form_data.get('due_date', '') }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Приоритет</label>
                        <select class="form-select" name="priority">
                            {% for value, label in priorities %}
                            <option value="{{ value }}" {% if form_data.get('priority', 'medium') == value %}selected{% endif %}>{{ label }}</option>
                            {% endfor %}
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Ответственный оператор</label>
                        <select class="form-select" id="assigned_to_id" name="assigned_to_id" data-selected="{{ form_data.get('assigned_to_id', '') }}">
                            <option value="">Не назначен</option>
                            {% for operator in assignees %}
                            <option value="{{ operator.id }}" {% if form_data.get('assigned_to_id')|int == operator.id %}selected{% endif %}>{{ operator.username }}</option>
                            {% endfor %}
                        </select>
                        <div class="form-text">Список операторов зависит от выбранной организации.</div>
                    </div>

                    <div class="col-12 d-flex flex-wrap gap-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="notify_target" id="notify_target" {% if form_data.get('notify_target', 'on') %}checked{% endif %}>
                            <label class="form-check-label" for="notify_target">Уведомить сотрудника/организацию</label>
                        </div>
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" name="notify_admins" id="notify_admins" {% if form_data.get('notify_admins', 'on') %}checked{% endif %}>
                            <label class="form-check-label" for="notify_admins">Уведомить администраторов</label>
                        </div>
                    </div>

                    <div class="col-12 d-flex gap-2">
                        <button class="btn btn-primary" type="submit">Создать задачу</button>
                        <a class="btn btn-outline-secondary" href="{{ url_for('index') }}">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
{{ super() }}
<script>
(() => {
    const orgSelect = document.getElementById('organization_id');
    const employeeSelect = document.getElementById('employee_id');
    const assigneeSelect = document.getElementById('assigned_to_id');

    if (orgSelect === null || employeeSelect === null) return;

    const employeesByOrg = {{ employees_by_org | tojson }};
    const assigneesByOrg = {{ assignees_by_org | tojson }};

    const selectedEmployee = String(employeeSelect.dataset.selected || '');
    const selectedAssignee = assigneeSelect ? String(assigneeSelect.dataset.selected || '') : '';

    function refill(selectEl, items, selectedValue, emptyLabel) {
        const prevValue = String(selectEl.value || selectedValue || '');
        selectEl.innerHTML = '';

        const baseOption = document.createElement('option');
        baseOption.value = '';
        baseOption.textContent = emptyLabel;
        selectEl.appendChild(baseOption);

        items.forEach((item) => {
            const option = document.createElement('option');
            option.value = String(item.id);
            option.textContent = item.name;
            selectEl.appendChild(option);
        });

        const hasPrev = items.some((item) => String(item.id) === prevValue);
        selectEl.value = hasPrev ? prevValue : '';
    }

    function refreshByOrganization() {
        const orgId = String(orgSelect.value || '');
        const employeeItems = employeesByOrg[orgId] || [];
        refill(employeeSelect, employeeItems, selectedEmployee, 'Общая задача организации');

        if (assigneeSelect) {
            const assigneeItems = assigneesByOrg[orgId] || [];
            refill(assigneeSelect, assigneeItems, selectedAssignee, 'Не назначен');
        }
    }

    orgSelect.addEventListener('change', refreshByOrganization);
    refreshByOrganization();
})();
</script>
{% endblock %}
