{% extends "base.html" %}
{% block title %}Статусы задач{% endblock %}
{% block content %}
<div class="row g-4">
    <div class="col-lg-5">
        <div class="card shadow-sm">
            <div class="card-body">
                <h1 class="h5 mb-3">Добавить статус</h1>
                <form method="post" action="{{ url_for('status_create') }}" class="row g-3">
                    <div class="col-12">
                        <label class="form-label">Название</label>
                        <input class="form-control" name="name" required maxlength="120">
                    </div>
                    <div class="col-12">
                        <label class="form-label">Порядок сортировки</label>
                        <input class="form-control" name="sort_order" type="number" placeholder="Например, 40">
                    </div>
                    <div class="col-12 form-check">
                        <input class="form-check-input" type="checkbox" id="new-is-final" name="is_final">
                        <label class="form-check-label" for="new-is-final">Считать выполненным</label>
                    </div>
                    <div class="col-12">
                        <button class="btn btn-primary" type="submit">Создать</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <div class="col-lg-7">
        <div class="card shadow-sm">
            <div class="table-responsive">
                <table class="table align-middle mb-0">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Название</th>
                            <th>Порядок</th>
                            <th>Финальный</th>
                            <th>Задач</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for status in statuses %}
                        <tr>
                            <td>{{ status.id }}</td>
                            <td>
                                <input class="form-control form-control-sm" name="name" value="{{ status.name }}" form="update-status-{{ status.id }}" required>
                            </td>
                            <td>
                                <input class="form-control form-control-sm" name="sort_order" type="number" value="{{ status.sort_order }}" form="update-status-{{ status.id }}" required>
                            </td>
                            <td>
                                <input class="form-check-input" type="checkbox" name="is_final" value="1" {% if status.is_final %}checked{% endif %} form="update-status-{{ status.id }}">
                            </td>
                            <td>{{ status.tasks.count() }}</td>
                            <td class="text-nowrap">
                                <form id="update-status-{{ status.id }}" method="post" action="{{ url_for('status_update', status_id=status.id) }}"></form>
                                <button class="btn btn-sm btn-outline-primary" type="submit" form="update-status-{{ status.id }}">Сохранить</button>
                                <form class="d-inline" method="post" action="{{ url_for('status_delete', status_id=status.id) }}" onsubmit="return confirm('Удалить статус?');">
                                    <button class="btn btn-sm btn-outline-danger" type="submit">Удалить</button>
                                </form>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="6" class="text-center text-muted py-4">Статусов пока нет</td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
{% endblock %}
